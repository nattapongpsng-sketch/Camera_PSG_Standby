<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camera Test</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      text-align: center;
      background: #f7f7fb;
    }
    .card{
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    video, canvas, img{
      width: 100%;
      max-width: 480px;
      background: #000;
      border-radius: 12px;
      margin-top: 12px;
    }
    canvas{ display:none; }

    .row{
      margin-top: 16px;
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:10px;
      padding:12px 18px;
      font-size:16px;
      cursor:pointer;
    }

    .primary{ background:#6f42c1; color:#fff; }
    .secondary{ background:#e9ecef; }
    .success{ background:#198754; color:#fff; }

    #log{
      text-align:left;
      background:#f1f3f5;
      padding:12px;
      border-radius:10px;
      margin-top:16px;
      font-size:13px;
      white-space:pre-wrap;
    }

    .result{
      margin-top:12px;
      padding:12px;
      background:#e8f7ee;
      border-radius:10px;
      display:none;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>📸 กล้อง (GitHub Pages)</h2>

    <div class="row">
      <button id="startBtn" class="primary">เปิดกล้อง</button>
      <button id="snapBtn" class="secondary">ถ่ายภาพ</button>
      <button id="uploadBtn" class="success">ส่งเข้า GAS</button>
      <button id="backBtn" class="secondary">ส่งกลับ GAS (postMessage)</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <img id="preview" style="display:none;">

    <div id="result" class="result"></div>
    <pre id="log"></pre>
  </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyW68WI1Bm7iY6CCSyFxvv3I3SV4PbM5Vovp3EvQtWKArq90PiFxAjCmUTuacNVUTUj/exec";

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const preview = document.getElementById('preview');
const log = document.getElementById('log');
const resultBox = document.getElementById('result');

let stream = null;
let captured = "";

function write(msg){
  log.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
}

async function startCamera(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video:true });
    video.srcObject = stream;
    write("เปิดกล้องสำเร็จ");
  }catch(e){
    write("เปิดกล้องไม่สำเร็จ: " + e.message);
  }
}

function snap(){
  if(!stream){ write("ยังไม่เปิดกล้อง"); return; }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  captured = canvas.toDataURL("image/jpeg",0.9);
  preview.src = captured;
  preview.style.display = "block";

  write("ถ่ายภาพแล้ว");
}

// ✅ วิธีที่ 1 (แนะนำ) → ส่งเข้า GAS ตรง
async function upload(){
  if(!captured){ write("ยังไม่มีภาพ"); return; }

  write("กำลังส่งเข้า GAS...");

  try{
    const res = await fetch(GAS_URL,{
      method:"POST",
      body: JSON.stringify({ image: captured })
    });

    const txt = await res.text();
    const data = JSON.parse(txt);

    if(data.status === "success"){
      write("✅ สำเร็จ");
      resultBox.style.display = "block";
      resultBox.innerHTML = `ไฟล์: ${data.fileName}<br><a href="${data.url}" target="_blank">เปิดรูป</a>`;
    }else{
      write("❌ error: "+data.message);
    }

  }catch(e){
    write("❌ ส่งไม่สำเร็จ: "+e.message);
  }
}

// ✅ วิธีที่ 2 → ส่งกลับ popup (ใช้กับ GAS index)
function sendBack(){
  if(!captured){ alert("ยังไม่มีภาพ"); return; }

  if(window.opener){
    window.opener.postMessage({
      type:"camera-image",
      imageBase64: captured
    },"*");

    alert("ส่งกลับแล้ว");
  }else{
    alert("ไม่มีหน้าหลัก");
  }
}

document.getElementById("startBtn").onclick = startCamera;
document.getElementById("snapBtn").onclick = snap;
document.getElementById("uploadBtn").onclick = upload;
document.getElementById("backBtn").onclick = sendBack;
</script>
</body>
</html>

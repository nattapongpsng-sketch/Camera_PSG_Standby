<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camera</title>

  <style>
    body{
      margin:0;
      background:#000;
      overflow:hidden;
      font-family:sans-serif;
    }

    video{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .hint{
      position:fixed;
      top:20px;
      width:100%;
      text-align:center;
      color:#fff;
      font-size:18px;
      font-weight:bold;
      text-shadow:0 0 10px #000;
    }

    .btn{
      position:fixed;
      bottom:30px;
      left:50%;
      transform:translateX(-50%);
      background:#00ffc8;
      border:none;
      padding:18px 28px;
      border-radius:50px;
      font-size:20px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn:active{
      transform:translateX(-50%) scale(0.95);
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>

<div class="hint">แตะเพื่อถ่ายภาพ</div>
<button class="btn" id="snapBtn">📸 ถ่ายภาพ</button>

<script>
const video = document.getElementById('video');
const snapBtn = document.getElementById('snapBtn');

let stream = null;

// ✅ เปิดกล้องอัตโนมัติ
async function startCamera(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user" },
      audio:false
    });
    video.srcObject = stream;
  }catch(err){
    alert("เปิดกล้องไม่ได้: " + err.message);
  }
}

// ✅ ถ่าย + ส่งกลับทันที
snapBtn.onclick = () => {
  if(!stream){
    alert("กล้องยังไม่พร้อม");
    return;
  }

  const canvas = document.createElement('canvas');
  canvas.width = 640;
  canvas.height = 480;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

  // ส่งกลับ GAS Web App
  if(window.opener){
    window.opener.postMessage({
      type: "camera-image",
      imageBase64: dataUrl
    }, "*");
  }

  // ปิดกล้อง
  stream.getTracks().forEach(t => t.stop());

  // ปิดหน้าต่าง
  window.close();
};

// เริ่มกล้องทันที
startCamera();

// กัน memory leak
window.addEventListener("beforeunload", ()=>{
  if(stream){
    stream.getTracks().forEach(t => t.stop());
  }
});
</script>

</body>
</html>

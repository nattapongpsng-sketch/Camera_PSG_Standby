<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera Scan</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 📝 ข้อความ */
.hint{
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
  color:#fff;
  font-size:20px;
  font-weight:bold;
  text-shadow:0 0 10px #000;
  z-index:20;
}

/* 👤 กรอบวงรี */
.face-frame{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:min(72vw, 380px);
  height:min(92vw, 500px);

  border:4px solid #00ffc8;
  border-radius:50%;

  box-shadow:0 0 20px #00ffc8;

  z-index:10;
  pointer-events:none;
}

/* 🔵 เส้นสแกน */
.scan-line{
  position:absolute;
  left:10%;
  width:80%;
  height:4px;
  background:#00ffc8;
  box-shadow:0 0 12px #00ffc8;
  border-radius:999px;

  animation: scanMove 2.2s infinite ease-in-out;
}

@keyframes scanMove{
  0%{ top:10%; }
  50%{ top:80%; }
  100%{ top:10%; }
}

/* 📸 ปุ่ม */
.btn{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#00ffc8;
  border:none;
  padding:18px 30px;
  border-radius:50px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  z-index:20;
}

.btn:active{
  transform:translateX(-50%) scale(0.95);
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>

<div class="hint">จัดใบหน้าให้อยู่ในกรอบ</div>

<div class="face-frame">
  <div class="scan-line"></div>
</div>

<button class="btn" id="snapBtn">📸 ยืนยันตัวตน</button>

<script>
const video = document.getElementById('video');
const snapBtn = document.getElementById('snapBtn');

let stream = null;

// ✅ เปิดกล้องอัตโนมัติ
async function startCamera(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user" },
      audio:false
    });
    video.srcObject = stream;
  }catch(err){
    alert("เปิดกล้องไม่ได้: " + err.message);
  }
}

// ✅ ถ่าย + ส่งกลับ
snapBtn.onclick = () => {
  if(!stream){
    alert("กล้องยังไม่พร้อม");
    return;
  }

  const canvas = document.createElement('canvas');
  canvas.width = 640;
  canvas.height = 480;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

  // ส่งกลับ Web App
  if(window.opener){
    window.opener.postMessage({
      type:"camera-image",
      imageBase64:dataUrl
    }, "*");
  }

  // ปิดกล้อง
  stream.getTracks().forEach(t => t.stop());

  // ปิดหน้า
  window.close();
};

// start auto
startCamera();

// cleanup
window.addEventListener("beforeunload", ()=>{
  if(stream){
    stream.getTracks().forEach(t => t.stop());
  }
});
</script>

</body>
</html>
